<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nCrypt — Open-source cryptanalysis toolkit for CTF challenges.">
    <title>nCrypt{% block title %}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>

<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="{{ url_for('index') }}" class="brand">
                <span class="brand-text">nCrypt</span>
            </a>
            <div class="nav-links">
                <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
                    Identifier
                </a>
                <a href="{{ url_for('list_ciphers') }}"
                    class="nav-link {% if request.endpoint == 'list_ciphers' %}active{% endif %}">
                    Tools
                </a>
                <div class="nav-divider"></div>
                <span class="nav-badge">{{ ciphers|length if ciphers is defined else '' }} modules</span>
            </div>
        </div>
    </nav>
    <main class="container" id="mainContent">{% block content %}{% endblock %}</main>
    <footer class="footer">
        <div class="footer-inner">
            <span class="footer-brand">nCrypt</span>
            <span class="footer-sep">|</span>
            <span>{{ ciphers|length if ciphers is defined else '' }} modules</span>
            <span class="footer-sep">|</span>
            <span>Recursive solver</span>
            <span class="footer-sep">|</span>
            <span>Quadgram engine</span>
        </div>
    </footer>
    <div class="toast-container" id="toastContainer"></div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="{{ url_for('static', filename='js/frequency.js') }}"></script>
    <script>
        function showToast(msg, type = 'info') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast toast-' + type;
            t.innerHTML = `<span class="toast-icon">${type === 'success' ? '&#10003;' : type === 'error' ? '&#10007;' : '&#9432;'}</span><span>${msg}</span>`;
            c.appendChild(t);
            gsap.fromTo(t, { opacity: 0, y: 20, scale: 0.95 }, { opacity: 1, y: 0, scale: 1, duration: 0.35, ease: 'back.out(1.7)' });
            setTimeout(() => {
                gsap.to(t, { opacity: 0, y: 10, scale: 0.95, duration: 0.25, ease: 'power2.in', onComplete: () => t.remove() });
            }, 2500);
        }
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard', 'success'));
        }
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
