services:
  dcode:
    build: .
    ports:
      - "${PORT:-5000}:5000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-ncrypt-secret-key-change-in-production}
      HOST: 0.0.0.0
      PORT: 5000
    volumes:
      - ./static:/app/static
      - ./templates:/app/templates
    restart: unless-stopped
