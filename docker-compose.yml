services:
  dcode:
    build: .
    ports:
      - "${PORT:-5000}:5000"
    environment:
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-qwen/qwen3-235b-a22b}
      SECRET_KEY: ${SECRET_KEY:-ncrypt-secret-key-change-in-production}
      HOST: 0.0.0.0
      PORT: 5000
    volumes:
      - ./static:/app/static
      - ./templates:/app/templates
    restart: unless-stopped
